<meta charset="UTF-8">

<title>Symbalyx — Appels Complets</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #e0e0e0; padding: 16px; padding-bottom: 100px; }
  .header { text-align: center; padding: 20px 0 12px; }
  .header h1 { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
  .header .sub { font-size: 12px; color: #888; margin-top: 4px; }
  .stats { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-card { flex: 1; min-width: 80px; background: #13131a; border-radius: 10px; padding: 10px; text-align: center; border: 1px solid #1e1e2a; }
  .stat-card .num { font-size: 22px; font-weight: 700; color: #fff; }
  .stat-card .label { font-size: 10px; color: #666; margin-top: 2px; }
  .stat-card.gold .num { color: #ff6b35; }
  .stat-card.green .num { color: #00c853; }

  .search-box { width: 100%; padding: 12px 16px; background: #13131a; border: 1px solid #1e1e2a; border-radius: 12px; color: #fff; font-size: 14px; margin-bottom: 12px; }
  .search-box::placeholder { color: #555; }
  .search-box:focus { outline: none; border-color: #ff6b35; }

  .filters { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 14px; border-radius: 100px; border: 1px solid #1e1e2a; background: #13131a; color: #888; font-size: 11px; cursor: pointer; }
  .filter-btn.active { background: #ff6b3533; border-color: #ff6b35; color: #ff6b35; }

  .prospect { background: #13131a; border-radius: 12px; margin-bottom: 8px; border: 1px solid #1e1e2a; overflow: hidden; }
  .prospect.done { opacity: 0.4; border-color: #00c85333; }
  .prospect-header { display: flex; align-items: center; padding: 12px 14px; gap: 10px; cursor: pointer; }
  .prospect .check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #333; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: transparent; cursor: pointer; }
  .prospect.done .check { background: #00c853; border-color: #00c853; color: #fff; }
  .prospect-info { flex: 1; min-width: 0; }
  .prospect-name { font-size: 13px; font-weight: 600; color: #fff; }
  .prospect-site { font-size: 10px; color: #555; }
  .prospect-score { font-size: 11px; color: #ff6b35; font-weight: 600; flex-shrink: 0; }
  .prospect.done .prospect-score { color: #00c853; }

  .call-btn { background: #00c853; color: #000; font-weight: 700; font-size: 12px; padding: 6px 14px; border-radius: 8px; text-decoration: none; flex-shrink: 0; display: flex; align-items: center; gap: 4px; }
  .prospect-details { padding: 0 14px 12px; display: none; }
  .prospect.expanded .prospect-details { display: block; }
  .script-box { background: #0d0d14; border-radius: 8px; padding: 10px; margin-top: 6px; border: 1px solid #1a1a28; }
  .script-box .label { font-size: 9px; text-transform: uppercase; color: #555; letter-spacing: 0.5px; margin-bottom: 4px; }
  .script-box .text { font-size: 12px; line-height: 1.5; color: #999; }

  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #0a0a0f; border-top: 1px solid #1e1e2a; padding: 10px 16px 20px; display: flex; gap: 8px; }
  .bottom-bar button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-primary { background: #ff6b35; color: #fff; }
  .btn-secondary { background: #1e1e2a; color: #888; }

  .banner { background: #1a1a28; border: 1px solid #ff6b3533; border-radius: 12px; padding: 14px; margin-bottom: 16px; text-align: center; }
  .banner .big { font-size: 24px; font-weight: 800; color: #ff6b35; }
  .banner p { font-size: 11px; color: #777; margin-top: 4px; }

  @media (prefers-color-scheme: light) {
    body { background: #f5f5f0; color: #222; }
    .header h1 { color: #000; }
    .stat-card, .prospect { background: #fff; border-color: #e0ddd5; }
    .prospect-name { color: #000; }
    .script-box { background: #f8f8f4; border-color: #e0ddd5; }
    .bottom-bar { background: #f5f5f0; border-color: #e0ddd5; }
    .btn-secondary { background: #e0ddd5; color: #555; }
    .banner { background: linear-gradient(135deg, #fff3e0, #fff); }
    .search-box { background: #fff; border-color: #e0ddd5; color: #000; }
    .filter-btn { background: #fff; border-color: #e0ddd5; color: #666; }
    .filter-btn.active { background: #ff6b3544; }
  }
</style>

const SCRIPTS = ["Bonjour, c'est Ars\u00e8ne de Symbalyx. Je suis pass\u00e9 sur votre site \u2014 il a un bon potentiel mais j'ai rep\u00e9r\u00e9 quelques probl\u00e8mes techniques qui vous co\u00fbtent des clients. Je peux vous les corriger en 24h. Vous avez 2 minutes ?", "Bonjour, Ars\u00e8ne de Symbalyx. Votre site est bien fait mais il n'est pas optimis\u00e9 pour les mobiles \u2014 vous perdez 70% de vos visiteurs. Je corrige \u00e7a aujourd'hui. Int\u00e9ress\u00e9 ?", "Bonjour, Ars\u00e8ne de Symbalyx \u00e0 Bordeaux. J'audite les sites des commer\u00e7ants et artisans localement. Le v\u00f4tre a besoin d'un coup de neuf c\u00f4t\u00e9 s\u00e9curit\u00e9 et performances. On en parle 5 minutes ?", "Bonjour, Ars\u00e8ne de Symbalyx. Je vous contacte suite \u00e0 une analyse de votre pr\u00e9sence en ligne. Votre site a des probl\u00e8mes de r\u00e9f\u00e9rencement local \u2014 vous n'apparaissez pas sur les recherches Google \u00e0 Bordeaux. Je peux vous aider.", "Bonjour, Ars\u00e8ne de Symbalyx. Votre site charge trop lentement, \u00e7a fait fuir les visiteurs. Je l'optimise en quelques heures. Vous \u00eates disponible pour qu'on regarde \u00e7a ensemble ?", "Bonjour, Ars\u00e8ne de Symbalyx. Pas de formulaire de contact sur votre site, pas de moyen de vous joindre facilement. Je vous installe \u00e7a en 30 minutes sans rien casser.", "Bonjour, Ars\u00e8ne de Symbalyx. Votre certificat SSL a un probl\u00e8me \u2014 Chrome affiche 'Non s\u00e9curis\u00e9'. Vos clients potentiels repartent. Je le r\u00e9pare en 20 minutes. Vous voulez qu'on fasse \u00e7a maintenant ?", "Bonjour, Ars\u00e8ne de Symbalyx. Votre site n'a pas de page visible sur Google My Business li\u00e9e correctement. Je vous mets en conformit\u00e9 en 1h pour appara\u00eetre dans Google Maps."];

const STORAGE_KEY = 'symbalyx_calls_v2';

function loadState() {
  try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : {}; } catch(e) { return {}; }
}
function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

function formatTel(phone) {
  if (!phone) return '';
  let c = phone.replace(/[\s\.\(\)-]/g, '');
  if (c.startsWith('00')) return '+' + c.slice(2);
  if (c.startsWith('0')) return '+33' + c.slice(1);
  return c;
}

function displayPhone(phone) {
  if (!phone) return '';
  const c = phone.replace(/[\s\.\(\)-]/g, '');
  if (c.startsWith('0033') || c.startsWith('+33') || c.startsWith('0')) {
    if (c.startsWith('0033')) return '0' + c.slice(4);
    if (c.startsWith('+33')) return '0' + c.slice(3);
    return c;
  }
  return phone;
}

function getScoreEmoji(score) {
  if (score >= 60) return '🔴';
  if (score >= 50) return '🟠';
  return '🟡';
}

let currentFilter = 'all';
let currentSearch = '';

function render() {
  const state = loadState();
  const container = document.getElementById('prospect-list');

  let filtered = PROSPECTS;
  if (currentFilter === 'done') filtered = filtered.filter(p => state[p.id]?.done);
  else if (currentFilter === 'pending') filtered = filtered.filter(p => !state[p.id]?.done);
  else if (currentFilter === 'top') filtered = filtered.slice(0, 20);

  if (currentSearch) {
    const s = currentSearch.toLowerCase();
    filtered = filtered.filter(p => p.name.toLowerCase().includes(s) || p.url.toLowerCase().includes(s));
  }

  const doneIds = Object.keys(state).filter(k => state[k]?.done).length;
  document.getElementById('done-num').textContent = doneIds;

  if (filtered.length === 0) {
    container.innerHTML = '<div class="banner"><p style="color:#666;font-size:13px">Aucun prospect trouvé</p></div>';
    return;
  }

  let html = '';
  filtered.forEach(p => {
    const done = state[p.id]?.done || false;
    const notes = state[p.id]?.notes || '';
    const scriptIdx = (p.id - 1) % SCRIPTS.length;
    const tel = 'tel:+' + formatTel(p.phone);

    html += '<div class="prospect ' + (done ? 'done' : '') + '" data-id="' + p.id + '">';
    html += '<div class="prospect-header" onclick="toggleExpand(' + p.id + ')">';
    html += '<div class="check" onclick="event.stopPropagation(); toggleDone(' + p.id + ')">' + (done ? '✓' : '') + '</div>';
    html += '<div class="prospect-info"><div class="prospect-name">' + getScoreEmoji(p.score) + ' ' + esc(p.name) + '</div><div class="prospect-site">' + esc(p.url) + '</div></div>';
    html += '<div class="prospect-score">' + (done ? '✓' : p.score + '') + '</div>';
    html += '<a href="' + tel + '" class="call-btn" onclick="event.stopPropagation()">📞 Appel</a>';
    html += '</div>';
    html += '<div class="prospect-details">';
    html += '<div class="script-box"><div class="label">🎯 Script</div><div class="text">' + esc(SCRIPTS[scriptIdx]) + '<br><br>📱 ' + displayPhone(p.phone) + '</div></div>';
    if (p.email) html += '<div class="script-box" style="margin-top:4px"><div class="label">📧 Email</div><div class="text">' + esc(p.email) + '</div></div>';
    html += '<textarea style="width:100%;margin-top:6px;background:#0d0d14;border:1px solid #1a1a28;border-radius:6px;padding:8px;color:#bbb;font-size:12px;resize:vertical;min-height:32px" placeholder="Notes après appel..." onchange="saveNotes(' + p.id + ', this.value)">' + esc(notes) + '</textarea>';
    html += '</div></div>';
  });

  container.innerHTML = html;
}

function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toggleDone(id) {
  const state = loadState();
  if (!state[id]) state[id] = { done: false, notes: '' };
  state[id].done = !state[id].done;
  saveState(state);
  render();
}

function toggleExpand(id) {
  const el = document.querySelector('.prospect[data-id="' + id + '"]');
  if (el) el.classList.toggle('expanded');
}

function saveNotes(id, val) {
  const state = loadState();
  if (!state[id]) state[id] = { done: false, notes: '' };
  state[id].notes = val;
  saveState(state);
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function filterProspects() {
  currentSearch = document.getElementById('search').value;
  render();
}

function copyToCall() {
  const state = loadState();
  const remaining = PROSPECTS.filter(p => !state[p.id]?.done);
  let text = '📞 LISTE APPELS SYMBALYX\n';
  text += new Date().toLocaleDateString('fr-FR') + '\n';
  text += '═══════════════════════════\n\n';
  remaining.slice(0, 30).forEach((p, i) => {
    text += (i+1) + '. ' + p.name + '\n';
    text += '   ' + displayPhone(p.phone) + '\n';
  });
  text += '\n' + remaining.length + ' restants sur ' + PROSPECTS.length;
  navigator.clipboard.writeText(text).then(() => alert('✅ ' + remaining.length + ' prospects copiés !'));
}

function resetCalls() {
  if (confirm('Réinitialiser tous les statuts ?')) {
    localStorage.removeItem(STORAGE_KEY);
    render();
  }
}

document.getElementById('date').textContent = new Date().toLocaleDateString('fr-FR', {
  weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
});

render();
</script>
