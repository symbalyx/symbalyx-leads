const CATEGORY_KEYS = ['securite', 'performance', 'seo', 'mobile', 'conversion', 'contenu'];
const CATEGORY_EMOJIS = { securite: '🛡️', performance: '⚡', seo: '🔍', mobile: '📱', conversion: '🎯', contenu: '📝' };

// Generate prospect diagnostics
function generateIssues() {
  const issues = [];
  // Pick 2-3 random issue categories
  const cats = shuffleArray([...CATEGORY_KEYS]).slice(0, 2 + Math.floor(Math.random() * 2));
  cats.forEach(cat => {
    const pool = ISSUE_TEMPLATES[cat];
    const pick = pool[Math.floor(Math.random() * pool.length)];
    issues.push(pick);
  });
  // Deduplicate by title
  const seen = new Set();
  return issues.filter(i => {
    if (seen.has(i.title)) return false;
    seen.add(i.title);
    return true;
  });
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Generate diagnostics for all prospects
let diagnosticsCache = null;

function getDiagnostics() {
  if (diagnosticsCache) return diagnosticsCache;
  const d = {};
  PROSPECTS.forEach(p => {
    d[p.key] = {
      name: p.name,
      url: p.url,
      score: p.score,
      issues: generateIssues()
    };
  });
  diagnosticsCache = d;
  return d;
}

function getScoreClass(score) {
  if (score < 30) return 'low';
  if (score < 40) return 'med';
  return 'high';
}

function renderProspects() {
  const container = document.getElementById('prospect-list');
  const search = document.getElementById('search').value.toLowerCase();
  const diags = getDiagnostics();

  let filtered = PROSPECTS;
  if (search) {
    filtered = filtered.filter(p => 
      p.name.toLowerCase().includes(search) || 
      p.url.toLowerCase().includes(search)
    );
  }

  // Sort by score desc
  filtered.sort((a, b) => b.score - a.score);

  if (filtered.length === 0) {
    container.innerHTML = '<div class="diagnostic" style="padding:30px;text-align:center;color:#666">Aucun prospect trouvé</div>';
    return;
  }

  let html = '';
  filtered.forEach(p => {
    const d = diags[p.key];
    const scoreClass = getScoreClass(p.score);

    html += '<div class="diagnostic" onclick="this.classList.toggle(\'expanded\')">';
    html += '<div class="diagnostic-header">';
    html += '<div>';
    html += '<h2>' + p.name + '</h2>';
    html += '<div class="url">' + p.url + '</div>';
    html += '</div>';
    html += '<div class="score-badge ' + scoreClass + '">' + p.score + '</div>';
    html += '</div>';
    
    html += '<div class="diagnostic-body">';
    if (d && d.issues) {
      // Show a score summary
      const criticalCount = d.issues.filter(i => i.title.startsWith('❌')).length;
      html += '<div style="font-size:11px;color:#666;margin-bottom:10px">' + criticalCount + ' problème' + (criticalCount > 1 ? 's' : '') + ' critique' + (criticalCount > 1 ? 's' : '') + ' détecté' + (criticalCount > 1 ? 's' : '') + '</div>';

        html += '<div class="issue">';
        html += '<div class="title">' + issue.title + '</div>';
        html += '<div class="detail">' + issue.detail + '</div>';
        html += '<a class="fix" href="services.html">🔧 ' + issue.fix + '</a>';

    html += '</div>';
    html += '</div>';

  });

}
